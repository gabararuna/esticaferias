<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estica Férias: Otimizando suas folgas!</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4059018857698196" crossorigin="anonymous"></script>

    <style>
        :root { --bg-color: #0E1117; --text-color: #ffffff; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; 
            
            /* MELHORIA: Permite rolagem apenas se o conteúdo não couber na tela */
            min-height: 100vh;
            min-height: 100dvh; /* Unidade mais precisa para navegadores mobile */
            overflow-x: hidden;
            overflow-y: auto; 
        }

        header { padding: 10px 15px; text-align: center; flex-shrink: 0; }
        header h1 { margin: 0 0 5px 0; font-size: 20px; }
        .seo-content { max-width: 800px; margin: 0 auto; line-height: 1.3; color: #aaa; font-size: 12px; }

        /* Espaço do Anúncio */
        .ad-slot-top { 
            width: 100%; 
            height: 60px; 
            margin-bottom: 5px; 
            flex-shrink: 0; 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            background-color: rgba(255, 255, 255, 0.02); 
        }

        /* Container do App */
        .app-main {
            flex-grow: 1; 
            display: flex; justify-content: center; align-items: center;
            padding-bottom: 15px;
            /* Garante que o app não fique espremido em telas pequenas */
            min-height: 650px; 
        }
        
        .app-wrapper {
            width: 96%; height: 100%;
            position: relative;
            border-radius: 12px;
            overflow: hidden; 
            
            /* MELHORIA: Borda visível e sombra para destacar os limites do app */
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        /* Iframe com recorte preciso mantido */
        iframe {
            position: absolute;
            top: -2px; 
            left: -2px; 
            width: calc(100% + 4px); 
            height: calc(100% + 14px); 
            border: none;
            display: block;
            background-color: var(--bg-color);
        }

        footer { padding: 15px 5px; text-align: center; font-size: 12px; color: #555; flex-shrink: 0; }
        footer a { color: #888; text-decoration: none; font-weight: bold; }
        footer a:hover { text-decoration: underline; color: #ccc; }
    </style>
</head>
<body>

    <header>
        <h1>Estica Férias</h1>
        <div class="seo-content">
            <p>Sua ferramenta para otimização de folgas no Brasil. Utilize nosso simulador inteligente para calcular como maximizar seu descanso.</p>
        </div>
    </header>

    <div class="ad-slot-top">
        <ins class="adsbygoogle"
             style="display:inline-block; width:100%; height:60px;"
             data-ad-client="ca-pub-4059018857698196"
             data-full-width-responsive="false"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <main class="app-main">
        <div class="app-wrapper">
            <iframe src="https://esticaferias.streamlit.app/?embed=true" 
                    allowfullscreen 
                    sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads">
            </iframe>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gabriel Araruna - <a href="/privacidade">Política de Privacidade</a></p>
    </footer>

</body>
</html>
