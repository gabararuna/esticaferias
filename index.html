<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estica Férias: Otimizando suas folgas!</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4059018857698196" crossorigin="anonymous"></script>

    <style>
        :root { --bg-color: #0E1117; --text-color: #ffffff; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden; /* Evita rolagem dupla no site pai */
        }

        /* Área de conteúdo para o Google ler (SEO) */
        header { padding: 15px 20px; text-align: center; flex-shrink: 0; }
        header h1 { margin: 0 0 5px 0; font-size: 24px; }
        .seo-content { max-width: 800px; margin: 0 auto; line-height: 1.4; color: #aaa; font-size: 13px; }

        /* Espaço para Anúncio no Topo */
        .ad-slot-top { width: 100%; text-align: center; margin-bottom: 5px; min-height: 90px; flex-shrink: 0; }

        /* Container do App - Centralizado e Recortado */
        .app-main {
            flex-grow: 1; /* Ocupa o espaço restante */
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; padding-bottom: 10px;
        }
        .app-wrapper {
            width: 96%; height: 100%;
            position: relative;
            border-radius: 12px;
            overflow: hidden; /* Recorta o iframe que vai vazar 2px pro lado */
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        iframe {
            position: absolute;
            
            /* Recorte Vertical: sobe 2px e estica 14px (2px do topo + 12px do rodapé) */
            top: -2px; 
            height: calc(100% + 28px); 
            
            /* Recorte Lateral: esconde 2px de cada lado */
            left: -2px; 
            width: calc(100% + 4px); 
            
            border: none;
            display: block;
        }

        footer { padding: 5px; text-align: center; font-size: 11px; color: #555; flex-shrink: 0; }
    </style>
</head>
<body>

    <header>
        <h1>Estica Férias</h1>
        <div class="seo-content">
            <p>Sua ferramenta para otimização de folgas no Brasil. Utilize nosso simulador para calcular como maximizar seu descanso. v.0.1.2</p>
        </div>
    </header>

    <div class="ad-slot-top">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-4059018857698196"
             data-ad-slot="AUTO"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <main class="app-main">
        <div class="app-wrapper">
            <iframe src="https://esticaferias.streamlit.app/?embed=true" 
                    allowfullscreen 
                    sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads">
            </iframe>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gabriel Araruna - <a href="/privacidade" style="color:#777;">Política de Privacidade</a></p>
    </footer>

</body>
</html>
