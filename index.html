<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estica Férias: Otimizando suas folgas!</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4059018857698196" crossorigin="anonymous"></script>

    <style>
        :root { --bg-color: #0E1117; --text-color: #ffffff; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden; /* Evita rolagem dupla no site pai */
        }

        /* Cabeçalho mais compacto */
        header { padding: 10px 15px; text-align: center; flex-shrink: 0; }
        header h1 { margin: 0 0 5px 0; font-size: 20px; } /* Fonte levemente menor */
        .seo-content { max-width: 800px; margin: 0 auto; line-height: 1.3; color: #aaa; font-size: 12px; }

        /* Espaço para Anúncio no Topo - ALTURA TRAVADA */
        .ad-slot-top { 
            width: 100%; 
            text-align: center; 
            margin-bottom: 5px; 
            min-height: 50px; 
            max-height: 90px; /* Impede o anúncio de engolir a tela */
            flex-shrink: 0; 
            overflow: hidden; /* Corta qualquer anúncio teimoso que tente passar de 90px */
        }

        /* Container do App - Centralizado e Recortado */
        .app-main {
            flex-grow: 1; /* Ocupa o espaço restante */
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; padding-bottom: 10px;
        }
        .app-wrapper {
            width: 96%; height: 100%;
            position: relative;
            border-radius: 12px;
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        iframe {
            position: absolute;
            top: -2px; 
            left: -2px; 
            width: calc(100% + 4px); 
            height: calc(100% + 14px); 
            border: none;
            display: block;
        }

        footer { padding: 5px; text-align: center; font-size: 11px; color: #555; flex-shrink: 0; }
    </style>
</head>
<body>

    <header>
        <h1>Estica Férias</h1>
        <div class="seo-content">
            <p>Sua ferramenta para otimização de folgas no Brasil. Utilize nosso simulador inteligente para calcular como maximizar seu descanso. v 0.3</p>
        </div>
    </header>

    <div class="ad-slot-top">
        <ins class="adsbygoogle"
             style="display:block; max-height: 90px;"
             data-ad-client="ca-pub-4059018857698196"
             data-ad-slot="AUTO"
             data-ad-format="horizontal"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <main class="app-main">
        <div class="app-wrapper">
            <iframe src="https://esticaferias.streamlit.app/?embed=true" 
                    allowfullscreen 
                    sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads">
            </iframe>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gabriel Araruna - <a href="/privacidade" style="color:#777;">Política de Privacidade</a></p>
    </footer>

</body>
</html>
