<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estica Férias: Otimizando suas folgas!</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-SUBSTITUA_PELO_SEU_ID" crossorigin="anonymous"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #0E1117; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 96%;  
            height: 94%; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-radius: 12px;
            overflow: hidden; /* Recorta o iframe que vai "vazar" 2px para fora */
            border: 1px solid rgba(255,255,255,0.05);
        }

        iframe { 
            position: absolute;
            /* Recorte Superior/Inferior: -45px */
            top: -45px; 
            height: calc(100% + 90px); 
            
            /* Recorte Lateral: -2px para esconder a borda branca lateral */
            left: -2px; 
            width: calc(100% + 4px); 
            
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe 
            src="https://esticaferias.streamlit.app/?embed=true" 
            allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking"
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
