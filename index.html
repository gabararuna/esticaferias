<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estica Férias: Otimizando suas folgas!</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-SUBSTITUA_PELO_SEU_ID" crossorigin="anonymous"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #0E1117; /* Cor escura do Streamlit */
        }

        /* O truque: fazemos o iframe ser ligeiramente maior que a tela 
           para esconder o header e o footer brancos do Streamlit Cloud */
        iframe { 
            position: absolute; 
            top: -45px; /* Empurra a barra branca superior para fora */
            left: 0; 
            width: 100%; 
            height: calc(100% + 90px); /* Compensa o deslocamento para o rodapé sumir também */
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://esticaferias.streamlit.app/?embed=true" 
        allow="accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking"
        sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"
        allowfullscreen>
    </iframe>
</body>
</html>
